<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <!-- Fuentes elegantes de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <!-- Vinculación del estilo CSS principal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Fondo interactivo de partículas flotantes (corazones y destellos) -->
    <canvas id="canvas-particulas"></canvas>

    <!-- Elemento de audio global (reproducción continua) -->
    <!-- Nota: Reemplaza "musica.mp3" con la ruta de tu archivo de sonido más adelante -->
    <audio id="musica-fondo" src="musica.mp3" loop></audio>

    <!-- Contenedor principal de la experiencia -->
    <main id="contenedor-experiencia">

        <!-- PANTALLA 1: Bienvenida con efecto máquina de escribir -->
        <section id="pantalla-1" class="pantalla activa">
            <div class="contenido-pantalla">
                <!-- Contenedor donde se escribirá el texto dinámicamente -->
                <h1 id="texto-maquina" class="texto-romantico"></h1>
                
                <!-- Botón de transición (oculto inicialmente) -->
                <button id="btn-entrar" class="boton-elegante oculto">
                    Comenzar la experiencia
                </button>
            </div>
        </section>

        <!-- PANTALLA 2: Placeholder preparado para el siguiente paso -->
        <section id="pantalla-2" class="pantalla">
            <div class="contenido-pantalla">
                <!-- Este contenido se puede expandir posteriormente en el script.js -->
                <h2 class="subtitulo-romantico">Un rincón especial para ti</h2>
                <p class="texto-suave">Esta pantalla está lista para recibir tu contenido personalizado, sorpresas o cartas de amor.</p>
            </div>
        </section>

    </main>

    <!-- Vinculación de la lógica de JavaScript -->
    <script src="script.js"></script>
</body>
</html>
