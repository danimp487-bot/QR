<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños, Mi Amor ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <button id="musicToggle" class="music-btn" aria-label="Reproducir/Pausar música">🎵</button>

    <div id="petals-container"></div>

    <section id="part1" class="active-section">
        <div class="card glass">
            <h1 class="romantic-title">Para Nerea ❤️</h1>
            <div class="text-container">
                <p id="typewriter1"></p><span class="cursor">|</span>
            </div>
            <button id="toPart2Btn" class="primary-btn hidden-element">
                ❤️ Comenzar nuestro viaje ❤️
            </button>
        </div>
    </section>

    <section id="part2" style="display: none;">
        <div class="card glass polaroid-card">
            <div id="memory-counter" class="counter">1 / 13</div>
            
            <div class="polaroid-frame">
                <img id="memory-img" src="img/foto1.jpg" alt="Nuestro recuerdo">
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div class="polaroid-info">
                <h2 id="memory-title" class="romantic-subtitle">Capítulo 1</h2>
                <p id="memory-text" class="memory-desc"></p>
            </div>

            <div class="nav-controls">
                <button id="prevBtn" class="nav-btn">◀ Anterior</button>
                <button id="nextBtn" class="nav-btn">Siguiente ▶</button>
            </div>

            <button id="toPart3Btn" class="primary-btn hidden-element" style="margin-top: 15px;">
                ✨ Leer el mensaje final ✨
            </button>
        </div>
    </section>

    <section id="part3" style="display: none;">
        <div class="card glass">
            <h1 class="romantic-title">Para siempre nosotros ❤️</h1>
            <div class="text-container">
                <p id="typewriter2"></p><span class="cursor">|</span>
            </div>
            <button id="finalSurpriseBtn" class="primary-btn hidden-element">
                💝 ¡Te amo con locura! 💝
            </button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
