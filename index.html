<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feliz Cumpleaños ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- Música -->

<audio id="bgMusic" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- Fondo -->

<div class="background"></div>

<div id="petals"></div>

<!-- ==========================
CARTA INICIAL
=========================== -->

<section id="intro">

    <div class="letter">

        <h1>Para Nerea ❤️</h1>

        <p id="typewriter"></p>

        <span id="cursor">|</span>

        <button id="startButton">

            ❤️ Comenzar nuestro viaje ❤️

        </button>

    </div>

</section>

<!-- ==========================
RECUERDOS
=========================== -->

<section id="memorySection">

    <div class="memoryCard">

        <img
            id="memoryImage"
            src=""
            alt="Recuerdo">

        <h2 id="memoryTitle"></h2>

        <p id="memoryText"></p>

        <button id="nextMemory">

            ❤️ Siguiente recuerdo ❤️

        </button>

    </div>

</section>

<!-- ==========================
CARTA FINAL
=========================== -->

<section id="finalSection">

    <div class="letter">

        <h1>Para siempre nosotros ❤️</h1>

        <p id="finalText"></p>

        <button id="finishButton">

            ❤️ Feliz cumpleaños mi vida ❤️

        </button>

    </div>

</section>

<!-- ==========================
TEXTO INICIAL
=========================== -->

<script>

const textoInicial = `Feliz 21 cumpleaños, mi amor. ❤️

Este año quería regalarte algo un poco diferente. No quería que este día se quedara solo en un regalo material, porque siento que lo más valioso que tenemos es todo lo que hemos vivido juntos.

Por eso he querido preparar este pequeño viaje por nuestra historia. Un recorrido por las etapas, los momentos, las risas, las aventuras y todos esos recuerdos que llevo guardados con tanto cariño. Quiero que, mientras avances, puedas volver a sentir todo lo bonito que hemos construido juntos.

Espero de corazón que te guste y que lo disfrutes tanto como yo he disfrutado preparándolo para ti.

Gracias por hacer mi vida mucho más feliz y por ser la persona con la que quiero seguir creando miles de recuerdos más.

Te amo con todo mi corazón.

Feliz cumpleaños, mi vida. ❤️`;

</script>

<script src="script.js"></script>

</body>

</html>
